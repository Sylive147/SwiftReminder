<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/svg+xml" href="https://github.githubassets.com/favicons/favicon.svg" />
  <title>卡片计数器</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <button id="settingsBtn" class="settings-fab" type="button" aria-label="打开设置" title="设置">⚙</button>

  <aside id="settingsPanel" class="settings-panel hidden" aria-label="颜色设置">
    <div class="settings-title">颜色设置</div>
    <div class="setting-row">
      <span class="setting-label">卡片起点色</span>
      <button id="cardStartColorSwatch" class="color-swatch" type="button" aria-label="选择卡片起点色"></button>
    </div>
    <div class="setting-row">
      <span class="setting-label">卡片终点色</span>
      <button id="cardEndColorSwatch" class="color-swatch" type="button" aria-label="选择卡片终点色"></button>
    </div>
    <div class="setting-row">
      <span class="setting-label">背景渐变起点</span>
      <button id="bgStartColorSwatch" class="color-swatch" type="button" aria-label="选择背景渐变起点"></button>
    </div>
    <div class="setting-row">
      <span class="setting-label">背景渐变终点</span>
      <button id="bgEndColorSwatch" class="color-swatch" type="button" aria-label="选择背景渐变终点"></button>
    </div>
    <div class="setting-row">
      <span class="setting-label">高光强度</span>
      <label class="inline-slider">
        <input id="glossSlider" type="range" min="0" max="100" step="1" />
        <em id="glossValue">0%</em>
      </label>
    </div>
    <button id="resetThemeBtn" class="reset-theme-btn" type="button">恢复默认配色</button>

    <div id="pickerOverlay" class="picker-overlay hidden">
      <div class="picker-header" id="pickerTitle">颜色调节</div>
      <div id="pickerPreview" class="picker-preview"></div>

      <label class="slider-row">
        <span>R</span>
        <input id="sliderR" type="range" min="0" max="255" />
        <em id="valueR">0</em>
      </label>
      <label class="slider-row">
        <span>G</span>
        <input id="sliderG" type="range" min="0" max="255" />
        <em id="valueG">0</em>
      </label>
      <label class="slider-row">
        <span>B</span>
        <input id="sliderB" type="range" min="0" max="255" />
        <em id="valueB">0</em>
      </label>

      <div class="picker-actions">
        <input id="pickerHexValue" class="color-value-input" type="text" readonly />
        <button id="pickerCancel" class="mini-btn" type="button">取消</button>
        <button id="pickerApply" class="mini-btn primary" type="button">确定</button>
      </div>
    </div>
  </aside>

  <main class="app">
    <section id="cards" class="cards" aria-live="polite"></section>
  </main>
  <footer id="updatedAt" class="footer-timestamp"></footer>

  <script src="app.js"></script>
</body>
</html>
